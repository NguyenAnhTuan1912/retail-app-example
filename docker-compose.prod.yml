services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail123
      POSTGRES_DB: retail_db
    volumes:
      - ./pgdata-prod:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "19000:19000"
    env_file:
      - .env.prod
    depends_on:
      - db
