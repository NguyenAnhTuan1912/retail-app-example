services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail123
      POSTGRES_DB: retail_db
    volumes:
      - ./pgdata-prod:/var/lib/postgresql/data

  server:
    build: ./app
    env_file:
      - ./app/.env.prod
    depends_on:
      - db

  web:
    build: ./web
    ports:
      - "80:80"
    depends_on:
      - server
